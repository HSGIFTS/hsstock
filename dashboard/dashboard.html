<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Dashboard</title>

  <link rel="stylesheet" href="dashboard.css">

<link rel="manifest" href="../manifest.json">

</head>

<body>

  <div class="container">

    <h1>Dashboard</h1>

    <div class="card">
      <h2>Total Products</h2>
      <p id="totalProducts">0</p>
    </div>

    <div class="card">
      <h2>Total Stock</h2>
      <p id="totalStock">0</p>
    </div>

    <div class="card">
      <h2>Total Sales</h2>
      <p id="totalSales">0</p>
    </div>

    <div class="card">
      <h2>Sales Count</h2>
      <p id="salesCount">0</p>
    </div>

    <div class="card">
      <h2>Low Stock</h2>
      <div id="lowStock"></div>
    </div>

    <button onclick="goProducts()">
      Products
    </button>

    <button onclick="goSales()">
      Sales
    </button>

  </div>

  <script type="module" src="dashboard.js"></script>

</body>

</html>
